<!doctype html>
<html lang="pt-BR">
  <head>
    <title>TCC</title>
    <meta charset="UTF-8" />

    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #111;
        color: white;
        font-family: monospace;
      }

      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      #topbar {
        height: 40px;
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 0 12px;
        background: #1a1a1a;
        border-bottom: 1px solid #333;
        overflow-x: auto;
      }

      #layout {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      #sidebar {
        width: 260px;
        background: #181818;
        border-right: 1px solid #333;
        overflow: auto;
        padding: 8px;
      }

      #editor {
        flex: 1;
      }

      button {
        background: #222;
        color: white;
        border: 1px solid #444;
        padding: 6px 10px;
        cursor: pointer;
        white-space: nowrap;
      }

      button.active {
        border-color: #4f8ef7;
      }

      .tree-item {
        padding: 4px 8px;
        cursor: pointer;
        user-select: none;
      }

      .tree-item:hover {
        background: #252525;
      }

      .folder {
        color: #999;
        font-weight: bold;
      }

      .file {
        color: #ddd;
      }

      .children {
        padding-left: 14px;
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div id="topbar"></div>

      <div id="layout">
        <div id="sidebar"></div>
        <div id="editor"></div>
      </div>
    </div>

    <script>
      window.MonacoEnvironment = {
        getWorkerUrl() {
          return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
self.MonacoEnvironment = {
  baseUrl: '/vendor/monaco/'
};

importScripts('/vendor/monaco/vs/base/worker/workerMain.js');
`)}`;
        },
      };
    </script>

    <script src="/vendor/monaco/vs/loader.js"></script>

    <script>
      require.config({
        paths: {
          vs: "/vendor/monaco/vs",
        },
      });

      require(["vs/editor/editor.main"], async function () {
        const topbar = document.getElementById("topbar");
        const sidebar = document.getElementById("sidebar");

        let LAB = "01";
        let currentFile = null;
        let files = [];

        const models = {};

        // lab ativo
        try {
          const statusRes = await fetch("/api/status");
          const status = await statusRes.json();

          LAB = status.labAtivo || "01";
        } catch {
          console.warn("erro carregando status");
        }

        const editor = monaco.editor.create(
          document.getElementById("editor"),
          {
            value: "",
            language: "python",
            theme: "vs-dark",
            automaticLayout: true,
            minimap: {
              enabled: false,
            },
          }
        );

        async function loadChallenges() {
          const res = await fetch(`/api/challenges/${LAB}`);
          const data = await res.json();

          files = data.editableFiles || [];
        }

        async function loadTree() {
          const res = await fetch(`/api/tree/${LAB}`);

          if (!res.ok) {
            sidebar.innerHTML = "erro carregando explorer";
            return;
          }

          const tree = await res.json();

          sidebar.innerHTML = "";

          renderTree(tree, sidebar);
        }

        function renderTree(nodes, parent) {
          for (const node of nodes) {
            const row = document.createElement("div");

            row.className = `tree-item ${node.type}`;

            if (node.type === "dir") {
              row.classList.add("folder");
              row.textContent = `📁 ${node.name}`;

              const children = document.createElement("div");
              children.className = "children";

              renderTree(node.children || [], children);

              parent.appendChild(row);
              parent.appendChild(children);
            } else {
              row.classList.add("file");
              row.textContent = node.name;

              row.onclick = () => loadFile(node.path);

              parent.appendChild(row);
            }
          }
        }

        async function loadFile(file) {
          currentFile = file;

          if (models[file]) {
            editor.setModel(models[file]);
            renderTabs();
            return;
          }

          const res = await fetch(`/api/files/${LAB}/${file}`);

          if (!res.ok) {
            alert("erro carregando arquivo");
            return;
          }

          const text = await res.text();

          const model = monaco.editor.createModel(
            text,
            "python"
          );

          models[file] = model;

          editor.setModel(model);

          renderTabs();
        }

        async function saveFile() {
          if (!currentFile) return;

          const value = editor.getValue();

          const res = await fetch(
            `/api/files/${LAB}/${currentFile}`,
            {
              method: "PUT",
              headers: {
                "Content-Type": "text/plain",
              },
              body: value,
            }
          );

          if (!res.ok) {
            alert("erro salvando");
            return;
          }

          console.log("saved");
        }

        function renderTabs() {
          topbar.innerHTML = "";

          for (const file of files) {
            const btn = document.createElement("button");

            btn.innerText = file;

            if (file === currentFile) {
              btn.classList.add("active");
            }

            btn.onclick = () => loadFile(file);

            topbar.appendChild(btn);
          }
        }

        editor.addCommand(
          monaco.KeyMod.CtrlCmd |
            monaco.KeyCode.KeyS,
          saveFile
        );

        await loadChallenges();
        await loadTree();

        if (files.length) {
          await loadFile(files[0]);
        }
      });
    </script>
  </body>
</html>
