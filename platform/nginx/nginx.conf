events { worker_connections 1024; }

http {
    upstream ui          { server ui:3000; }
    upstream orchestrator { server orchestrator:4000; }
    upstream grafana     { server grafana:3000; }

    # mapeia o lab ativo para a porta correta
    # lab-01 → :8001, lab-02 → :8002, lab-03 → :8003...
    upstream lab-api     { server lab-01:8000; }

    server {
        listen 80;

        # ── painel principal ──────────────────────────────────────────────
        location / {
            proxy_pass http://ui;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── orquestrador (API da plataforma) ──────────────────────────────
        location /api/ {
            proxy_pass http://orchestrator/;
            proxy_set_header Host $host;
            # SSE: desabilita buffering para logs em tempo real
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 3600s;
            proxy_set_header   Connection '';
            chunked_transfer_encoding on;
        }

        # ── grafana ───────────────────────────────────────────────────────
        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
        }

        # ── health check do nginx ─────────────────────────────────────────
        location /health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
